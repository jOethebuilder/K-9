  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1200;
      --bg-card:  #211800;
      --orange:   #FF7A00;
      --orange-dim: #7a3a00;
      --orange-glow: rgba(255,122,0,0.18);
      --text:     #e8d9c0;
      --muted:    #7a6a50;
      --border:   #3a2800;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 20px 80px;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 52px;
      width: 100%;
      max-width: 560px;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 48px 32px 40px;
      background: var(--bg-card);
      position: relative;
    }

    .hero::before, .hero::after,
    .hero .corner-bl, .hero .corner-br {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      border-color: var(--orange-dim);
      border-style: solid;
    }
    .hero::before  { top: 8px;    left: 8px;    border-width: 2px 0 0 2px; }
    .hero::after   { top: 8px;    right: 8px;   border-width: 2px 2px 0 0; }
    .hero .corner-bl { bottom: 8px; left: 8px;  border-width: 0 0 2px 2px; }
    .hero .corner-br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }
